<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
     <link rel="stylesheet" href="css/style.css">

    <title>Cadastro - Domus pizza</title>
</head>
<body>
    <div class="form">
        <form action="#">
            <div class="form-header">
                <div class="title">
                    <h1>Cadastre-se</h1>
                </div>
                <div class="login-button">
                    <button><a href="index.html">X</a></button>
                </div>
            </div>

            <div class="input-group">
                <div class="input-box">
                    <label for="firstname">Primeiro nome</label>
                    <input id="firstname" type="text" name="firstname" placeholder="Digite seu primeiro nome" required> 
                </div>

                <div class="input-box">
                    <label for="lastname">Sobrenome</label>
                    <input id="lastname" type="text" name="lastname" placeholder="Digite seu sobrenome" required> 
                </div>

                <div class="input-box">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="Digite seu email" required> 
                </div>

                <div class="input-box">
                    <label for="number">Número (Telefone)</label>
                    <input id="number" type="tel" name="number" placeholder="(xx) xxxx-xxxx" required> 
                </div>

                <div class="input-box">
                    <label for="password">Senha</label>
                    <input id="password" type="password" name="password" placeholder="Digite sua senha" required>
                    <div id="password-strength-indicator"></div> 
                </div>

                <div class="input-box">
                    <label for="confirmpassword">Confirme sua senha</label>
                    <input id="confirmpassword" type="password" name="confirmpassword" placeholder="Digite sua senha" required> 
                </div>

                <div class="input-box">
                    <label for="cep">CEP</label>
                    <input id="cep" type="text" name="cep" placeholder="Digite seu CEP" required maxlength="8"> 
                </div>

                <div class="input-box">
                    <label for="address">Endereço (Rua/Avenida)</label>
                    <input id="address" type="text" name="address" placeholder="Rua / Avenida" required> 
                </div>

                <div class="input-box">
                    <label for="neighborhood">Bairro</label>
                    <input id="neighborhood" type="text" name="neighborhood" placeholder="Bairro" required> 
                </div>

                <div class="input-box">
                    <label for="city">Cidade</label>
                    <input id="city" type="text" name="city" placeholder="Cidade" required> 
                </div>

                <div class="input-box">
                    <label for="state">Estado (UF)</label>
                    <input id="state" type="text" name="state" placeholder="UF" required maxlength="2"> 
                </div>

                <div class="input-box">
                    <label for="address_number">Número</label>
                    <input id="address_number" type="text" name="address_number" placeholder="Nº" required> 
                </div>

                <div class="input-box">
                    <label for="complement">Complemento</label>
                    <input id="complement" type="text" name="complement" placeholder="Apto, Bloco, etc. (Opcional)"> 
                </div>
                
                </div>

            <div class="gender-inputs">
                <div class="gender-title">
                    <h6>Gênero</h6>
                </div>
                <div class="gender-group">
                    <div class="gender-input">
                        <input type="radio" id="female" name="gender">
                        <label for="female">Feminino</label>
                    </div>
                    <div class="gender-input">
                        <input type="radio" id="male" name="gender">
                        <label for="male">Masculino</label>
                    </div>
                    <div class="gender-input">
                        <input type="radio" id="others" name="gender">
                        <label for="others">Outros</label>
                    </div>
                    <div class="gender-input">
                        <input type="radio" id="none" name="gender">
                        <label for="none">Prefiro não dizer</label>
                    </div>
                </div>
            </div>

            <div class="continue-button">
                <button type="submit">Continuar</button>
            </div>
        </form>
    </div>
    
    
    <script src="JS/script.js"></script>
</body>
</html>
